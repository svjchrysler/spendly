<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no, interactive-widget=resizes-content" />
    <meta name="theme-color" content="#050505" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f7f7f8" media="(prefers-color-scheme: light)" />
    <meta name="description" content="Spendly — Gestiona tus gastos mensuales" />
    <meta name="application-name" content="Spendly" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Spendly" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="format-detection" content="telephone=no" />
    <title>Spendly</title>
    <script>
      (() => {
        try {
          const stored = localStorage.getItem('spendly-theme')
          let theme = 'light'
          if (stored === 'light' || stored === 'dark') {
            theme = stored
          } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            theme = 'dark'
          }
          document.documentElement.classList.toggle('dark', theme === 'dark')
          const color = theme === 'dark' ? '#050505' : '#f7f7f8'
          document.querySelectorAll('meta[name="theme-color"]').forEach((meta) => {
            meta.setAttribute('content', color)
          })
        } catch {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
